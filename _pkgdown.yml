url: https://sgl-projects.github.io/rsgl/

template:
  bootstrap: 5
  bootswatch: cosmo

home:
  title: rsgl — An R Implementation of the SGL Graphics Language
  description: >
    Generate visualizations from any DBI connection using SGL,
    a grammar of graphics language designed to look and feel like SQL.

navbar:
  structure:
    left:  [intro, reference, articles, news]
    right: [search, github]
  components:
    intro:
      text: Get started
      href: articles/rsgl.html
    articles:
      text: Articles
      menu:
        - text: Example gallery
          href: articles/example-gallery.html

reference:
  - title: Plotting
    contents:
      - dbGetPlot
  - title: Geoms
    contents:
      - points
      - lines
      - bars
      - boxes
  - title: Type metadata
    contents:
      - type_classifications
  - title: Datasets
    desc: Sample data used in examples and vignettes.
    contents:
      - cars
      - trees

articles:
  - title: Articles
    navbar: ~
    contents:
      - rsgl
      - example-gallery

news:
  releases:
    - text: "Development version"
      href: news/index.html
