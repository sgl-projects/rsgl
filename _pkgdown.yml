url: https://sgl-projects.github.io/rsgl/

template:
  bootstrap: 5
  bootswatch: cosmo

home:
  title: rsgl — An R Implementation of the SGL Graphics Language
  description: >
    Generate visualizations from any DBI connection using SGL,
    a grammar of graphics language designed to look and feel like SQL.

navbar:
  structure:
    left:  [intro, reference, articles, news]
    right: [search, github]
  components:
    intro:
      text: Get started
      href: articles/rsgl.html
    articles:
      text: Articles
      menu:
        - text: Example gallery
          href: articles/example-gallery.html
        - text: ---
        - text: "SGL Paper (arXiv)"
          href: https://arxiv.org/pdf/2505.14690

reference:
  - title: Generating plots
    contents:
      - dbGetPlot
  - title: Geoms
    contents:
      - points
      - lines
      - bars
      - boxes
  - title: Column-level transformations
    contents:
      - bin
  - title: Aggregations
    contents:
      - count
      - avg
  - title: Scales
    contents:
      - linear
      - log
      - ln
  - title: SGL type classifications
    contents:
      - type_classifications
  - title: Datasets
    desc: Sample data used in examples and vignettes.
    contents:
      - cars
      - trees

articles:
  - title: Articles
    navbar: ~
    contents:
      - rsgl
      - example-gallery
